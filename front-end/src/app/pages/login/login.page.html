<ion-content class="ion-padding ion-text-center login-background">
  <div class="login-wrapper">
    <div class="logo-container">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
      <h1>Tickets System</h1>
      <p>Gerenciamento de Senhas</p>
    </div>

    <div class="login-box">
      <!-- Campo de E-mail -->
      <ion-item lines="none" class="custom-input">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input type="email" placeholder="E-mail" [(ngModel)]="user.email"></ion-input>
      </ion-item>

      <!-- Campo de Senha com Olhinho (Corrigido) -->
      <ion-item lines="none" class="custom-input">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input 
          [type]="showPassword ? 'text' : 'password'" 
          placeholder="Senha" 
          [(ngModel)]="user.password">
          
          <!-- Botão do olhinho acoplado ao final do input -->
          <ion-button fill="clear" slot="end" (click)="togglePassword()" class="eye-button">
            <ion-icon slot="icon-only" [name]="passwordToggleIcon"></ion-icon>
          </ion-button>
        </ion-input>
      </ion-item>

      <!-- Botão de Login -->
      <ion-button expand="block" (click)="login()" class="btn-login">
        ACESSAR SISTEMA
      </ion-button>

      <!-- Links de rodapé -->
      <ion-button fill="clear" size="small" (click)="setOpen(true)" class="btn-forgot">
        Esqueci minha senha
      </ion-button>

      <ion-button expand="block" fill="clear" size="small" (click)="criarConta()" style="--color: #4d8dff">
        Não tem uma conta? Cadastre-se
      </ion-button>

      <!-- Modal de Recuperação -->
      <ion-modal [isOpen]="isModalOpen">
        <ng-template>
          <ion-header>
            <ion-toolbar color="primary">
              <ion-title>Recuperar Senha</ion-title>
              <ion-buttons slot="end">
                <ion-button (click)="setOpen(false)">Fechar</ion-button>
              </ion-buttons>
            </ion-toolbar>
          </ion-header>
          <ion-content class="ion-padding">
            <p>Digite seu e-mail cadastrado para receber as instruções.</p>
            <ion-item lines="outline">
              <ion-label position="stacked">E-mail</ion-label>
              <ion-input type="email" [(ngModel)]="emailRecuperacao" placeholder="exemplo@email.com"></ion-input>
            </ion-item>
            <ion-button expand="block" class="ion-margin-top" (click)="enviarEmail()">
              Enviar Link de Recuperação
            </ion-button>
          </ion-content>
        </ng-template>
      </ion-modal>

    </div>
  </div>
</ion-content>
